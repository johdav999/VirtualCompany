services:
  postgres:
    image: postgres:17
    container_name: virtualcompany-postgres
    environment:
      POSTGRES_DB: "virtualcompany"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
